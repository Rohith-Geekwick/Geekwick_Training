<!DOCTYPE html>
<html>
<head>
    <title>Intern Profile Page</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Intern Directory</h1>
    </header>

    <!-- MAIN -->
    <main>

        <!-- PROFILE CARDS SECTION -->
        <section>
            <h2>Our Interns</h2>

            <div>

                <!-- CARD 1 -->
                <div>
                    <img src="https://via.placeholder.com/120" alt="Intern 1">
                    <h3>Rohith G</h3>
                    <p>AIML Intern</p>
                    <button>View Profile</button>
                </div>

                <!-- CARD 2 -->
                <div>
                    <img src="https://via.placeholder.com/120" alt="Intern 2">
                    <h3>Ankit</h3>
                    <p>Web Developer Intern</p>
                    <button>View Profile</button>
                </div>

                <!-- CARD 3 -->
                <div>
                    <img src="https://via.placeholder.com/120" alt="Intern 3">
                    <h3>Rahul</h3>
                    <p>Data Analyst Intern</p>
                    <button>View Profile</button>
                </div>

            </div>
        </section>

        <!-- FORM SECTION -->
        <section>
            <h2>Apply for Internship</h2>

            <form>

                <!-- TEXT INPUT -->
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name"><br><br>

                <!-- EMAIL INPUT -->
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br><br>

                <!-- DROPDOWN -->
                <label for="role">Select Role:</label><br>
                <select id="role" name="role">
                    <option value="aiml">AIML</option>
                    <option value="web">Web Development</option>
                    <option value="data">Data Analyst</option>
                </select><br><br>

                <!-- CHECKBOX -->
                <label>Skills:</label><br>
                <input type="checkbox" id="html" name="skills" value="HTML">
                <label for="html">HTML</label><br>

                <input type="checkbox" id="css" name="skills" value="CSS">
                <label for="css">CSS</label><br>

                <input type="checkbox" id="js" name="skills" value="JavaScript">
                <label for="js">JavaScript</label><br><br>

                <!-- SUBMIT -->
                <button type="submit">Submit Application</button>

            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Intern Portal</p>
    </footer>

</body>
</html>
