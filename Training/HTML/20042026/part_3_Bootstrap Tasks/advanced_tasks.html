<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Advanced</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Custom CSS (required in advanced tasks) */
        body {
            background-color: #f4f6f9;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        .pricing-card {
            border: 2px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- DASHBOARD SECTION -->
        <h2 class="text-center mb-4">Dashboard</h2>

        <div class="row text-center">

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h5>Total Interns</h5>
                    <p>120</p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h5>Active Projects</h5>
                    <p>35</p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card p-3">
                    <h5>Completed Tasks</h5>
                    <p>560</p>
                </div>
            </div>

        </div>

        <!-- PROFILE CARDS (Responsive Layout) -->
        <h2 class="text-center mt-5 mb-4">Our Interns</h2>

        <div class="row">

            <div class="col-lg-4 col-md-6 col-12 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Rohith G</h5>
                    <p>AIML Intern</p>
                    <button class="btn btn-primary">View</button>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-12 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Ankit</h5>
                    <p>Web Developer</p>
                    <button class="btn btn-success">View</button>
                </div>
            </div>

            <div class="col-lg-4 col-md-6 col-12 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Rahul</h5>
                    <p>Data Analyst</p>
                    <button class="btn btn-warning">View</button>
                </div>
            </div>

        </div>

        <!-- PRICING SECTION -->
        <h2 class="text-center mt-5 mb-4">Pricing Plans</h2>

        <div class="row text-center">

            <div class="col-md-4 mb-4">
                <div class="card pricing-card p-3">
                    <h4>Basic</h4>
                    <h3>₹0</h3>
                    <p>Free Access</p>
                    <button class="btn btn-outline-primary">Choose</button>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card pricing-card p-3">
                    <h4>Pro</h4>
                    <h3>₹499</h3>
                    <p>Advanced Features</p>
                    <button class="btn btn-primary">Choose</button>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card pricing-card p-3">
                    <h4>Premium</h4>
                    <h3>₹999</h3>
                    <p>All Features</p>
                    <button class="btn btn-success">Choose</button>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
