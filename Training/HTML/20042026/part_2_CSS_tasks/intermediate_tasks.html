<!DOCTYPE html>
<html>
<head>
    <title>Intern Directory</title>

    <style>
        /* Reset + base styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
        }

        /* Container (center content) */
        .container {
            width: 80%;
            margin: auto;
            text-align: center;
        }

        /* Headings */
        h1, h2 {
            color: #2c3e50;
        }

        /* Card layout (flexbox) */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Profile card styling */
        .card {
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 200px;
            background-color: white;
        }

        /* Button styling */
        button {
            padding: 8px 12px;
            border: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        /* Hover effect */
        button:hover {
            background-color: #2980b9;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        /* Footer spacing */
        footer {
            margin-top: 30px;
        }
    </style>

</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <h1>Intern Directory</h1>
        </header>

        <!-- MAIN -->
        <main>

            <!-- PROFILE SECTION -->
            <section>
                <h2>Our Interns</h2>

                <div class="card-container">

                    <div class="card">
                        <img src="https://via.placeholder.com/120" alt="Intern 1">
                        <h3>Rohith G</h3>
                        <p>AIML Intern</p>
                        <button>View Profile</button>
                    </div>

                    <div class="card">
                        <img src="https://via.placeholder.com/120" alt="Intern 2">
                        <h3>Ankit</h3>
                        <p>Web Developer Intern</p>
                        <button>View Profile</button>
                    </div>

                    <div class="card">
                        <img src="https://via.placeholder.com/120" alt="Intern 3">
                        <h3>Rahul</h3>
                        <p>Data Analyst Intern</p>
                        <button>View Profile</button>
                    </div>

                </div>
            </section>

            <!-- TABLE SECTION -->
            <section>
                <h2>Student Table</h2>

                <table>
                    <tr>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Status</th>
                    </tr>

                    <tr>
                        <td>Rohith</td>
                        <td>CSE</td>
                        <td>Active</td>
                    </tr>

                    <tr>
                        <td>Ankit</td>
                        <td>ECE</td>
                        <td>Inactive</td>
                    </tr>

                </table>
            </section>

        </main>

        <!-- FOOTER -->
        <footer>
            <p>© 2026 Intern Portal</p>
        </footer>

    </div>

</body>
</html>
