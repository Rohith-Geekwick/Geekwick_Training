<!DOCTYPE html>
<html>
<head>
    <title>Intern Profile Page</title>

    <style>
        /* 1. Background color */
        body {
            background-color: #f0f4f8;
        }

        /* 2. Heading text color */
        h1, h2 {
            color: #2c3e50;
        }

        /* 5. Paragraph font size */
        p {
            font-size: 18px;
        }

        /* 3 & 4. Card styling */
        .card {
            padding: 15px;              /* padding */
            border: 1px solid #ccc;     /* border */
            margin: 10px;
        }
    </style>

</head>
<body>

    <header>
        <h1>Intern Directory</h1>
    </header>

    <main>

        <section>
            <h2>Our Interns</h2>

            <div>

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Rohith G</h3>
                    <p>AIML Intern</p>
                    <button>View Profile</button>
                </div>

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Ankit</h3>
                    <p>Web Developer Intern</p>
                    <button>View Profile</button>
                </div>

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Rahul</h3>
                    <p>Data Analyst Intern</p>
                    <button>View Profile</button>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 Intern Portal</p>
    </footer>

</body>
</html>
