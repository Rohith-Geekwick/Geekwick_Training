<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Intermediate</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Intern Portal</a>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container mt-5">

        <h2 class="text-center mb-4">Our Interns</h2>

        <!-- GRID SYSTEM (3 columns) -->
        <div class="row">

            <!-- CARD 1 -->
            <div class="col-md-4 col-lg-4 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Rohith G</h5>
                    <p>AIML Intern</p>
                    <button class="btn btn-primary">View Profile</button>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="col-md-4 col-lg-4 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Ankit</h5>
                    <p>Web Developer</p>
                    <button class="btn btn-success">View Profile</button>
                </div>
            </div>

            <!-- CARD 3 -->
            <div class="col-md-4 col-lg-4 mb-4">
                <div class="card text-center p-3">
                    <img src="https://via.placeholder.com/120" class="mx-auto">
                    <h5 class="mt-3">Rahul</h5>
                    <p>Data Analyst</p>
                    <button class="btn btn-warning">View Profile</button>
                </div>
            </div>

        </div>

        <!-- FORM -->
        <h2 class="text-center mt-5 mb-3">Contact Form</h2>

        <form>

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter your name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>

        </form>

    </div>

</body>
</html>
