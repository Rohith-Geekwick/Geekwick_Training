<!DOCTYPE html>
<html>
<head>
    <title>Intermediate HTML Project</title>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>My Portfolio Page</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- PROFILE SECTION -->
        <section>
            <h2>Profile</h2>

            <div>
                <img src="https://via.placeholder.com/150" alt="Profile Image">
                <h3>Rohith G</h3>
                <p>Software Developer</p>
                <button>Contact Me</button>
            </div>
        </section>

        <!-- TABLE SECTION -->
        <section>
            <h2>Student Table</h2>

            <table border="1">
                <tr>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Status</th>
                </tr>

                <tr>
                    <td>Rohith</td>
                    <td>CSE</td>
                    <td>Active</td>
                </tr>

                <tr>
                    <td>Ankit</td>
                    <td>ECE</td>
                    <td>Inactive</td>
                </tr>
            </table>
        </section>

        <!-- FORM SECTION -->
        <section>
            <h2>Contact Form</h2>

            <form>
                <label>Name:</label><br>
                <input type="text" placeholder="Enter your name"><br><br>

                <label>Email:</label><br>
                <input type="email" placeholder="Enter your email"><br><br>

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 My Portfolio</p>
    </footer>

</body>
</html>
