<!DOCTYPE html>
<html>
<head>
    <title>Intern Directory</title>

    <style>
        /* RESET */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
        }

        /* FIXED HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        /* MAIN CONTAINER */
        .container {
            width: 90%;
            margin: auto;
            margin-top: 80px; /* prevents overlap with fixed header */
            text-align: center;
        }

        h2 {
            color: #2c3e50;
        }

        /* FLEXBOX LAYOUT */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap; /* makes it responsive */
        }

        /* CARD DESIGN */
        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* CARD HOVER EFFECT */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* REUSABLE BUTTON CLASS */
        .btn {
            display: inline-block;
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            background-color: #2c3e50;
            color: white;
        }

        /* RESPONSIVE (Mobile) */
        @media (max-width: 768px) {
            .card-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>

</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Intern Directory</h1>
    </header>

    <!-- MAIN -->
    <div class="container">

        <section>
            <h2>Our Interns</h2>

            <div class="card-container">

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Rohith G</h3>
                    <p>AIML Intern</p>
                    <a href="#" class="btn">View Profile</a>
                </div>

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Ankit</h3>
                    <p>Web Developer Intern</p>
                    <a href="#" class="btn">View Profile</a>
                </div>

                <div class="card">
                    <img src="https://via.placeholder.com/120">
                    <h3>Rahul</h3>
                    <p>Data Analyst Intern</p>
                    <a href="#" class="btn">View Profile</a>
                </div>

            </div>
        </section>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Intern Portal</p>
    </footer>

</body>
</html>
